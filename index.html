<!DOCTYPE html>
<html lang="en" class="antialiased"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IMO 3 - Q2 2026 Roadmap</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { font-family: "Figtree", sans-serif; -webkit-font-smoothing: antialiased; background: #f6f5f3; color: #090806ec; }

  /* ── TOP BAR ── */
  .topbar {
    background: #0b0b0a; color: #fff; padding: 16px 24px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }
  .topbar-left { display: flex; align-items: center; gap: 16px; }
  .topbar-title { font-size: 16px; font-weight: 600; letter-spacing: -0.25px; color: #ffffff; }
  .topbar-badge {
    background: #e1e51a; color: #29320c; font-size: 12px; font-weight: 600;
    padding: 4px 12px; border-radius: 8px; letter-spacing: 0.3px;
  }
  .topbar-update { font-size: 12px; color: #ffffffb2; font-weight: 400; }
  .topbar-right { display: flex; align-items: center; gap: 16px; }

  /* ── ROADMAP GRID ── */
  .roadmap-container { overflow: auto; padding: 0; max-height: calc(100vh - 56px); position: relative; }
  .roadmap { display: grid; }

  /* ── MONTH HEADER ── */
  .month-group-header {
    background: #f6f5f3; text-align: center; padding: 16px 4px 12px;
    font-size: 12px; font-weight: 600; color: #090806ec; letter-spacing: 1.5px;
    text-transform: uppercase;
    border-bottom: 1px solid #756b571a; border-right: 1px solid #756b571a;
    position: sticky; top: 0; z-index: 12;
  }
  .month-group-header.corner { border-right: 1px solid #8f867633; position: sticky; left: 0; z-index: 14; }

  /* ── WEEK HEADER ── */
  .week-header {
    background: #5f4f300d; text-align: center; padding: 8px 4px;
    font-size: 12px; font-weight: 500; color: #16140e8c; border-right: 1px solid #756b571a;
    border-bottom: 1px solid #8f867633;
    position: sticky; top: 44px; z-index: 11;
    letter-spacing: 0.3px;
  }
  .week-header.corner {
    background: #5f4f300d; border-right: 1px solid #8f867633;
    font-size: 12px; color: #16140e8c; font-weight: 600;
    position: sticky; left: 0; z-index: 13;
  }
  .week-header.current { background: #e1e51a33; color: #46520f; }
  .week-header.month-start { border-left: 1px solid #8f867633; }

  /* ── SWIMLANE LABEL ── */
  .swimlane-label {
    background: #eceae6; border-right: 1px solid #756b571a; border-bottom: 1px solid #8f867633;
    padding: 16px 20px; line-height: 1.3;
    display: flex; flex-direction: column; justify-content: center; gap: 4px;
    min-height: 64px;
    position: sticky; left: 0; z-index: 10;
  }
  .swimlane-label .sl-name { font-size: 14px; font-weight: 600; color: #090806ec; }

  /* ── CELLS ── */
  .swimlane-cell {
    background: #eceae6; border-right: 1px solid #756b571a; border-bottom: 1px solid #8f867633;
    padding: 8px 6px; min-height: 64px; display: flex; flex-direction: column;
  }
  .swimlane-cell.current-week { background: #e8e6df; }
  .swimlane-cell.month-start { border-left: 1px solid #8f867633; }
  .swimlane-cell .cell-items { flex: 1; }

  /* ── ITEM CARDS ── */
  .item-card {
    background: #ffffff; border: 1px solid #756b571a; border-radius: 12px;
    padding: 12px 14px; margin-bottom: 6px;
    font-size: 12px; line-height: 1.4; word-break: break-word;
    box-shadow: 0px 1px 2px rgba(119,111,95,0.06), 0px 1px 3px rgba(117,107,87,0.04);
    transition: box-shadow 0.2s ease, transform 0.15s ease;
    cursor: pointer; position: relative;
  }
  .item-card:hover { box-shadow: 0px 3px 8px rgba(119,111,95,0.12), 0px 1px 3px rgba(117,107,87,0.06); transform: translateY(-1px); }
  .item-card:active { transform: scale(0.98); }
  .item-card .item-title { font-weight: 600; font-size: 13px; color: #090806ec; display: block; }
  .item-card .item-desc { font-size: 12px; color: #16140e8c; margin-top: 4px; line-height: 1.5; font-weight: 400; display: block; }
  .item-card .item-date { font-weight: 600; font-size: 12px; color: #090806ec; display: block; margin-top: 8px; font-variant-numeric: tabular-nums; }
  .item-card .item-countries { font-size: 11px; color: #21c1266; margin-top: 4px; font-weight: 500; line-height: 1.4; }

  /* Phase variants — subtle left-border accent, card stays neutral */
  .item-card.phase1 { border-left: 4px solid #8b8b8b; }
  .item-card.phase2 { border-left: 4px solid #555555; }
  .item-card.phase-ga { border-left: 4px solid #0b0b0a; }

  .item-card .phase-tag {
    display: inline-block; font-size: 10px; font-weight: 600; letter-spacing: 0.5px;
    text-transform: uppercase; padding: 2px 8px; border-radius: 4px; margin-bottom: 6px;
  }
  .phase-tag.tag-phase1 { background: #d5d5d5; color: #4a4a4a; }
  .phase-tag.tag-phase2 { background: #b0b0b0; color: #2a2a2a; }
  .phase-tag.tag-ga { background: #0b0b0a; color: #ffffff; }

  /* ── ITEM POPUP ── */
  .item-popup-overlay {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(11,11,10,0.5); z-index: 200;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; transition: opacity 0.2s ease; pointer-events: none;
  }
  .item-popup-overlay.visible { opacity: 1; pointer-events: auto; }
  .item-popup {
    background: #ffffff; border-radius: 24px; padding: 32px;
    max-width: 460px; width: 90%;
    box-shadow: 0px 24px 48px rgba(11,11,10,0.16), 0px 8px 16px rgba(11,11,10,0.08);
    transform: translateY(12px); transition: transform 0.3s cubic-bezier(0.2, 0, 0, 1);
  }
  .item-popup-overlay.visible .item-popup { transform: translateY(0); }
  .item-popup .popup-title { font-size: 18px; font-weight: 600; color: #090806ec; margin-bottom: 20px; line-height: 1.3; letter-spacing: -0.25px; }
  .item-popup .popup-row { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 12px; font-size: 14px; }
  .item-popup .popup-label { font-weight: 500; color: #21c1266; min-width: 110px; flex-shrink: 0; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
  .item-popup .popup-value { color: #090806ec; font-weight: 500; font-size: 14px; }
  .item-popup .popup-desc { background: #5f4f300d; border-radius: 12px; padding: 16px; font-size: 14px; color: #16140e8c; line-height: 1.55; margin-top: 4px; }
  .item-popup .popup-close {
    display: block; margin: 24px auto 0; background: #0b0b0a; color: #fff;
    border: none; border-radius: 12px; padding: 12px 32px; font-size: 14px;
    font-weight: 600; cursor: pointer; font-family: "Figtree", sans-serif;
    transition: background 0.15s ease;
  }
  .item-popup .popup-close:hover { background: #252422; }
  .item-popup .popup-phase-badge {
    display: inline-block; padding: 4px 12px; border-radius: 8px;
    font-size: 12px; font-weight: 600; color: #fff; letter-spacing: 0.3px;
  }
  .popup-phase-badge.badge-phase1 { background: #8b8b8b; }
  .popup-phase-badge.badge-phase2 { background: #555555; }
  .popup-phase-badge.badge-ga { background: #0b0b0a; }

  /* ── FOOTER ── */
  .footer {
    background: #0b0b0a; padding: 12px 24px;
    display: flex; justify-content: space-between; align-items: center;
    font-size: 12px; color: #ffffffb2;
  }
  .footer .live-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: #e1e51a; margin-right: 6px; vertical-align: middle; }
  .footer .offline-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: #fb2c36; margin-right: 6px; vertical-align: middle; }
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="topbar-left">
    <span class="topbar-title">IMO 3 &mdash; Q2 2026 Roadmap</span>
    <span class="topbar-badge">Q2</span>
    <span class="topbar-update" id="lastUpdate"></span>
  </div>
  <div class="topbar-right">
    <span id="connIndicator" style="font-size:11px;color:#ffffffb2;"></span>
  </div>
</div>

<!-- ITEM POPUP -->
<div class="item-popup-overlay" id="itemPopupOverlay" onclick="closePopup(event)">
  <div class="item-popup" onclick="event.stopPropagation()">
    <div class="popup-title" id="popupTitle"></div>
    <div id="popupBody"></div>
    <button class="popup-close" onclick="closePopup()">Close</button>
  </div>
</div>

<!-- ROADMAP -->
<div class="roadmap-container">
  <div class="roadmap" id="roadmapGrid"></div>
</div>

<!-- FOOTER -->
<div class="footer">
  <span>IMO 3 &middot; Q2 2026</span>
  <span>April &ndash; June</span>
</div>

<script>
const MONTHS = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
const MONTH_FULL = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const CURRENT_MONTH = new Date().getMonth();
const CURRENT_YEAR = 2026;
const Q2_MONTHS = [3, 4, 5];

function generateMonthWeeks(year) {
  const slots = [];
  for (let m = 0; m < 12; m++) {
    const lastDay = new Date(year, m + 1, 0).getDate();
    const ranges = [[1,7],[8,14],[15,21],[22,28]];
    if (lastDay > 28) ranges.push([29, lastDay]);
    ranges.forEach((r, wi) => {
      slots.push({
        idx: slots.length, monthIdx: m, weekInMonth: wi + 1, label: `W${wi + 1}`,
        startDay: new Date(year, m, r[0]), endDay: new Date(year, m, r[1]),
      });
    });
  }
  return slots;
}

const ALL_SLOTS = generateMonthWeeks(CURRENT_YEAR);
const Q2_SLOTS = ALL_SLOTS.filter(s => Q2_MONTHS.includes(s.monthIdx));

function dateToSlotIdx(dateStr) {
  if (!dateStr) return Q2_SLOTS[0] ? Q2_SLOTS[0].idx : 0;
  const d = new Date(dateStr);
  const m = d.getMonth();
  const day = d.getDate();
  const monthSlots = ALL_SLOTS.filter(s => s.monthIdx === m);
  for (let i = monthSlots.length - 1; i >= 0; i--) {
    if (day >= monthSlots[i].startDay.getDate()) return monthSlots[i].idx;
  }
  return monthSlots.length > 0 ? monthSlots[0].idx : 0;
}

const CURRENT_SLOT_IDX = dateToSlotIdx(new Date().toISOString().slice(0, 10));

const FIREBASE_CONFIG = {
  apiKey: "AIzaSyAyEUhJ3wK9iOXcPIXFB7kxPmLIqg-EY4U",
  authDomain: "imo-3-roadmap.firebaseapp.com",
  databaseURL: "https://imo-3-roadmap-default-rtdb.firebaseio.com",
  projectId: "imo-3-roadmap",
  storageBucket: "imo-3-roadmap.firebasestorage.app",
  messagingSenderId: "438198445146",
  appId: "1:438198445146:web:3ee052573ed2f302966463",
  measurementId: "G-8Q8F1PJNDC"
};
const FIREBASE_DB_PATH = 'roadmap_q2_v26';

let data = { swimlanes: [], items: [] };

function escHtml(str) {
  if (!str) return '';
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function formatDateShort(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr);
  return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
}

// ═══════════════════════════════════════════════════
// FIREBASE
// ═══════════════════════════════════════════════════
window.addEventListener('DOMContentLoaded', () => {
  try {
    if (!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
    const db = firebase.database();

    db.ref('.info/connected').on('value', snap => {
      const online = snap.val() === true;
      document.getElementById('connIndicator').innerHTML = online
        ? '<span class="live-dot"></span> Live'
        : '<span class="offline-dot"></span> Connecting...';
    });

    db.ref(FIREBASE_DB_PATH).on('value', snapshot => {
      const val = snapshot.val();
      if (val && val.swimlanes) {
        data.swimlanes = Array.isArray(val.swimlanes) ? val.swimlanes : Object.values(val.swimlanes || {});
        data.items = val.items ? (Array.isArray(val.items) ? val.items : Object.values(val.items)) : [];
        data.items.forEach(it => {
          if (it.neededFor && !Array.isArray(it.neededFor)) it.neededFor = Object.values(it.neededFor);
          if (it.dependentOn && !Array.isArray(it.dependentOn)) it.dependentOn = Object.values(it.dependentOn);
        });
        data.swimlanes.forEach(sl => {
          if (sl.subRows && !Array.isArray(sl.subRows)) sl.subRows = Object.values(sl.subRows);
        });
      }
      if (val && val.lastUpdatedAt) {
        const d = new Date(val.lastUpdatedAt);
        document.getElementById('lastUpdate').textContent = 'Last update: ' +
          d.toLocaleString('en-GB', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' }) +
          (val.lastUpdatedBy ? ' by ' + val.lastUpdatedBy : '');
      }
      render();
    });
  } catch(e) {
    document.getElementById('connIndicator').innerHTML = '<span class="offline-dot"></span> Error';
  }
});

// ═══════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════
function render() {
  const grid = document.getElementById('roadmapGrid');
  if (!grid) return;
  grid.innerHTML = '';
  const visibleSlotIdxs = Q2_SLOTS.map(s => s.idx);
  const colCount = visibleSlotIdxs.length;

  grid.style.gridTemplateColumns = `200px repeat(${colCount}, minmax(140px, 1fr))`;

  // Month headers
  const cornerMonth = document.createElement('div');
  cornerMonth.className = 'month-group-header corner';
  cornerMonth.textContent = '';
  grid.appendChild(cornerMonth);

  let i = 0;
  while (i < visibleSlotIdxs.length) {
    const s = ALL_SLOTS[visibleSlotIdxs[i]];
    const monthIdx = s.monthIdx;
    let span = 0;
    while (i + span < visibleSlotIdxs.length && ALL_SLOTS[visibleSlotIdxs[i + span]].monthIdx === monthIdx) span++;
    const mgh = document.createElement('div');
    mgh.className = 'month-group-header';
    mgh.textContent = MONTHS[monthIdx];
    mgh.style.gridColumn = `span ${span}`;
    grid.appendChild(mgh);
    i += span;
  }

  // Week headers
  const cornerWeek = document.createElement('div');
  cornerWeek.className = 'week-header corner';
  cornerWeek.textContent = '';
  grid.appendChild(cornerWeek);

  let prevMonthIdx = -1;
  visibleSlotIdxs.forEach(sIdx => {
    const s = ALL_SLOTS[sIdx];
    const wh = document.createElement('div');
    let cls = 'week-header';
    if (sIdx === CURRENT_SLOT_IDX) cls += ' current';
    if (s.monthIdx !== prevMonthIdx) cls += ' month-start';
    wh.className = cls;
    wh.textContent = `W${s.weekInMonth}`;
    wh.title = `${s.startDay.toLocaleDateString('en-GB')} – ${s.endDay.toLocaleDateString('en-GB')}`;
    grid.appendChild(wh);
    prevMonthIdx = s.monthIdx;
  });

  // Group items by title+endDate, merging countries
  function mergeItems(rawItems) {
    const groups = {};
    rawItems.forEach(it => {
      const key = (it.title || '') + '||' + (it.endDate || '');
      if (!groups[key]) {
        groups[key] = { ...it, _countries: it.subRow ? [it.subRow] : [] };
      } else {
        if (it.subRow && !groups[key]._countries.includes(it.subRow)) {
          groups[key]._countries.push(it.subRow);
        }
      }
    });
    return Object.values(groups);
  }

  // Render cells for a flat row
  function renderSlotCells(grid, slItems, visibleSlotIdxs, extraCls) {
    let prevMonth = -1;
    visibleSlotIdxs.forEach(sIdx => {
      const s = ALL_SLOTS[sIdx];
      const cell = document.createElement('div');
      let cls = 'swimlane-cell' + (extraCls || '');
      if (sIdx === CURRENT_SLOT_IDX) cls += ' current-week';
      if (s.monthIdx !== prevMonth) cls += ' month-start';
      cell.className = cls;

      const itemsContainer = document.createElement('div');
      itemsContainer.className = 'cell-items';

      const cellItems = slItems.filter(it => dateToSlotIdx(it.endDate) === sIdx);
      const overflowItems = (sIdx === visibleSlotIdxs[0])
        ? slItems.filter(it => dateToSlotIdx(it.endDate) < visibleSlotIdxs[0])
        : [];

      [...cellItems, ...overflowItems].forEach(it => {
        const card = document.createElement('div');
        let cardCls = 'item-card';
        const titleLower = (it.title || '').toLowerCase();
        if (titleLower === 'phase 1') cardCls += ' phase1';
        else if (titleLower === 'phase 2') cardCls += ' phase2';
        else if (titleLower === 'all customers repriced') cardCls += ' phase-ga';
        card.className = cardCls;

        const deliveryDate = formatDateShort(it.endDate);
        const descText = it.description ? escHtml(it.description) : '';
        const countries = (it._countries && it._countries.length > 0) ? it._countries.join(', ') : '';

        let phaseTag = '';
        if (titleLower === 'phase 1') phaseTag = '<span class="phase-tag tag-phase1">Phase 1</span>';
        else if (titleLower === 'phase 2') phaseTag = '<span class="phase-tag tag-phase2">Phase 2</span>';
        else if (titleLower === 'all customers repriced') phaseTag = '<span class="phase-tag tag-ga">Complete</span>';

        card.innerHTML =
          (phaseTag ? `<div>${phaseTag}</div>` : '') +
          `<div class="item-title">${escHtml(it.title)}</div>` +
          (descText ? `<div class="item-desc">${descText}</div>` : '') +
          `<div class="item-date">${escHtml(deliveryDate)}</div>` +
          (countries ? `<div class="item-countries">${escHtml(countries)}</div>` : '');

        card.addEventListener('click', () => showPopup(it));
        itemsContainer.appendChild(card);
      });

      cell.appendChild(itemsContainer);
      grid.appendChild(cell);
      prevMonth = s.monthIdx;
    });
  }

  // Swimlane rows — all rendered as flat single rows
  const swimlanes = data.swimlanes || [];
  const items = data.items || [];

  swimlanes.forEach((sl, idx) => {
    const label = document.createElement('div');
    label.className = 'swimlane-label';
    label.innerHTML = `<span class="sl-name">${escHtml(sl.name)}</span>` + (sl.id === 's2c' ? '<div style="font-size:11px;color:#bb4d00;margin-top:6px;line-height:1.5;font-weight:400;">Items missing because still being scoped: <em>New pricing page in app and portal, new pricing calculator, dynamic pricing, support of contracts for pay-once offers.</em></div>' : '');
    grid.appendChild(label);

    const slItems = items.filter(it => it.swimlaneId === sl.id);
    const merged = mergeItems(slItems);
    renderSlotCells(grid, merged, visibleSlotIdxs, '');
  });
}

// ═══════════════════════════════════════════════════
// ITEM POPUP
// ═══════════════════════════════════════════════════
function showPopup(item) {
  const overlay = document.getElementById('itemPopupOverlay');
  const titleEl = document.getElementById('popupTitle');
  const bodyEl = document.getElementById('popupBody');

  titleEl.textContent = item.title || 'Untitled';

  const titleLower = (item.title || '').toLowerCase();
  let phaseBadge = '';
  if (titleLower === 'phase 1') phaseBadge = '<span class="popup-phase-badge badge-phase1">Phase 1</span>';
  else if (titleLower === 'phase 2') phaseBadge = '<span class="popup-phase-badge badge-phase2">Phase 2</span>';
  else if (titleLower === 'all customers repriced') phaseBadge = '<span class="popup-phase-badge badge-ga">All Customers Repriced</span>';

  const sl = (data.swimlanes || []).find(s => s.id === item.swimlaneId);
  const swimlaneName = sl ? sl.name : '';
  const subRowName = item.subRow || '';

  const startDate = item.startDate ? new Date(item.startDate).toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' }) : '\u2014';
  const endDate = item.endDate ? new Date(item.endDate).toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' }) : '\u2014';

  let html = '';
  if (phaseBadge) html += `<div class="popup-row">${phaseBadge}</div>`;
  html += `<div class="popup-row"><span class="popup-label">Workstream</span><span class="popup-value">${escHtml(swimlaneName)}</span></div>`;
  const countries = (item._countries && item._countries.length > 0) ? item._countries.join(', ') : subRowName;
  if (countries) html += `<div class="popup-row"><span class="popup-label">Country</span><span class="popup-value">${escHtml(countries)}</span></div>`;
  html += `<div class="popup-row"><span class="popup-label">Delivery</span><span class="popup-value">${escHtml(endDate)}</span></div>`;
  html += `<div class="popup-row"><span class="popup-label">Start</span><span class="popup-value">${escHtml(startDate)}</span></div>`;
  if (item.owner) html += `<div class="popup-row"><span class="popup-label">Owner</span><span class="popup-value">${escHtml(item.owner)}</span></div>`;
  if (item.description) html += `<div class="popup-row"><span class="popup-label">Description</span></div><div class="popup-desc">${escHtml(item.description)}</div>`;
  else html += `<div class="popup-row"><span class="popup-label">Description</span><span class="popup-value" style="color:#21c1266;font-style:italic;">No description provided</span></div>`;

  bodyEl.innerHTML = html;
  overlay.classList.add('visible');
}

function closePopup(e) {
  if (e && e.target && e.target !== document.getElementById('itemPopupOverlay')) return;
  document.getElementById('itemPopupOverlay').classList.remove('visible');
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closePopup();
});
</script>
</body></html>
