<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IMO 3 - Q2 2026 Roadmap</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: #f5f5f0; color: #1a1a1a; }

  /* ── TOP BAR ── */
  .topbar {
    background: #1a1a1a; color: #fff; padding: 12px 28px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }
  .topbar-left { display: flex; align-items: center; gap: 16px; }
  .topbar-title { font-size: 15px; font-weight: 700; letter-spacing: -0.3px; }
  .topbar-badge {
    background: #D2F55E; color: #1a1a1a; font-size: 11px; font-weight: 700;
    padding: 3px 10px; border-radius: 4px; letter-spacing: 0.3px;
  }
  .topbar-update { font-size: 11px; color: rgba(255,255,255,0.45); font-weight: 400; }
  .topbar-right { display: flex; align-items: center; gap: 16px; }
  .topbar-legend { display: flex; gap: 14px; align-items: center; }
  .topbar-legend-item { display: flex; align-items: center; gap: 5px; font-size: 10px; color: rgba(255,255,255,0.55); font-weight: 500; }
  .topbar-legend-dot { width: 8px; height: 8px; border-radius: 2px; }

  /* ── USAGE GUIDE ── */
  .usage-guide {
    background: #eaeae5; border-bottom: 1px solid #ddddd8;
    padding: 10px 28px; font-size: 12px; color: #6b6b60; font-weight: 400;
  }
  .usage-guide strong { color: #1a1a1a; font-weight: 600; }

  /* ── ROADMAP GRID ── */
  .roadmap-container { overflow: auto; padding: 0; max-height: calc(100vh - 82px); position: relative; }
  .roadmap { display: grid; }

  /* ── MONTH HEADER ── */
  .month-group-header {
    background: #f5f5f0; text-align: center; padding: 14px 4px 10px;
    font-size: 13px; font-weight: 700; color: #1a1a1a; letter-spacing: 0.5px;
    text-transform: uppercase;
    border-bottom: 2px solid #d5d5cc; border-right: 1px solid #e0e0d8;
    position: sticky; top: 0; z-index: 12;
  }
  .month-group-header.corner { border-right: 1px solid #d5d5cc; position: sticky; left: 0; z-index: 14; }

  /* ── WEEK HEADER ── */
  .week-header {
    background: #ededea; text-align: center; padding: 8px 2px;
    font-size: 10px; font-weight: 600; color: #8a8a80; border-right: 1px solid #e0e0d8;
    border-bottom: 1px solid #d5d5cc;
    position: sticky; top: 40px; z-index: 11;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .week-header.corner {
    background: #ededea; border-right: 1px solid #d5d5cc;
    font-size: 11px; color: #6b6b60; font-weight: 700; letter-spacing: 0;
    position: sticky; left: 0; z-index: 13;
  }
  .week-header.current { background: #e6f5c2; color: #4a6600; }
  .week-header.month-start { border-left: 2px solid #d5d5cc; }

  /* ── SWIMLANE LABEL ── */
  .swimlane-label {
    background: #fff; border-right: 1px solid #e0e0d8; border-bottom: 2px solid #d5d5cc;
    padding: 16px 18px; font-size: 12px; font-weight: 700; line-height: 1.3;
    display: flex; flex-direction: column; justify-content: center; gap: 0;
    min-height: 56px;
    position: sticky; left: 0; z-index: 10;
  }
  .swimlane-label .sl-name { font-size: 15px; font-weight: 800; color: #1a1a1a; }
  .swimlane-label.parent-label { border-bottom: 2px solid #d5d5cc; }

  .subrow-label {
    background: #fafaf6; border-right: 1px solid #e8e8e0; border-bottom: 1px solid #eaeae5;
    padding: 8px 14px; font-size: 12px; font-weight: 500; color: #4a4a40;
    display: flex; align-items: center; gap: 0; min-height: 48px;
    position: sticky; left: 160px; z-index: 10;
  }
  .subrow-label.last-subrow { border-bottom: 2px solid #d5d5cc; }
  .subrow-label .subrow-name { font-weight: 600; font-size: 13px; }

  /* ── CELLS ── */
  .swimlane-cell {
    background: #fff; border-right: 1px solid #eaeae5; border-bottom: 2px solid #d5d5cc;
    padding: 6px 5px; min-height: 56px; display: flex; flex-direction: column;
  }
  .swimlane-cell.current-week { background: #f9fce8; }
  .swimlane-cell.month-start { border-left: 2px solid #d5d5cc; }
  .swimlane-cell .cell-items { flex: 1; }
  .swimlane-cell.subrow-cell { min-height: 48px; border-bottom: 1px solid #eaeae5; }
  .swimlane-cell.subrow-cell.last-subrow { border-bottom: 2px solid #d5d5cc; }

  /* ── ITEM CARDS ── */
  .item-card {
    background: #e8edd8; border: 1px solid #d5dac5; border-radius: 6px;
    padding: 10px 12px; margin-bottom: 5px; font-size: 11px;
    line-height: 1.4; word-break: break-word;
    transition: box-shadow 0.15s, transform 0.1s;
    cursor: pointer; position: relative;
  }
  .item-card:hover { box-shadow: 0 4px 14px rgba(0,0,0,0.08); transform: translateY(-1px); }
  .item-card .item-title { font-weight: 700; font-size: 12px; color: #1a1a1a; display: block; }
  .item-card .item-desc { font-size: 11px; color: #5a5a50; margin-top: 4px; line-height: 1.45; font-weight: 400; display: block; }
  .item-card .item-date { font-weight: 700; font-size: 11px; color: #1a1a1a; display: block; margin-top: 6px; }
  .item-card .item-countries { font-size: 10px; color: #6b6b60; margin-top: 4px; font-weight: 500; line-height: 1.4; }

  /* Phase colour variants */
  .item-card.phase1 { background: #f5d4d4; border-color: #e8b8b8; }
  .item-card.phase1 .item-title { color: #7f1d1d; }
  .item-card.phase1 .item-date { color: #7f1d1d; }
  .item-card.phase1 .item-desc { color: #9b3a3a; }

  .item-card.phase2 { background: #f5e6c4; border-color: #e8d5a8; }
  .item-card.phase2 .item-title { color: #78350f; }
  .item-card.phase2 .item-date { color: #78350f; }
  .item-card.phase2 .item-desc { color: #92400e; }

  .item-card.phase-ga { background: #e8edd8; border-color: #d5dac5; }

  /* Status dot */
  .item-card .status-dot {
    position: absolute; top: 8px; right: 8px;
    width: 8px; height: 8px; border-radius: 50%;
    border: 1.5px solid rgba(255,255,255,0.7);
  }
  .status-dot.done { background: #22c55e; }
  .status-dot.in-progress { background: #D2F55E; border-color: #9ab800; }
  .status-dot.planned { background: #d5d5cc; border-color: #c0c0b8; }

  /* ── ITEM POPUP ── */
  .item-popup-overlay {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.45); z-index: 200;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; transition: opacity 0.15s; pointer-events: none;
  }
  .item-popup-overlay.visible { opacity: 1; pointer-events: auto; }
  .item-popup {
    background: #fff; border-radius: 12px; padding: 28px 32px;
    max-width: 440px; width: 90%; box-shadow: 0 24px 64px rgba(0,0,0,0.2);
    transform: translateY(10px); transition: transform 0.15s;
  }
  .item-popup-overlay.visible .item-popup { transform: translateY(0); }
  .item-popup .popup-title { font-size: 18px; font-weight: 800; color: #1a1a1a; margin-bottom: 16px; line-height: 1.3; }
  .item-popup .popup-row { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 10px; font-size: 13px; }
  .item-popup .popup-label { font-weight: 600; color: #8a8a80; min-width: 100px; flex-shrink: 0; font-size: 12px; }
  .item-popup .popup-value { color: #1a1a1a; font-weight: 500; }
  .item-popup .popup-desc { background: #f5f5f0; border-radius: 8px; padding: 12px 14px; font-size: 13px; color: #3a3a30; line-height: 1.55; margin-top: 4px; }
  .item-popup .popup-close {
    display: block; margin: 20px auto 0; background: #1a1a1a; color: #fff;
    border: none; border-radius: 6px; padding: 10px 28px; font-size: 13px;
    font-weight: 600; cursor: pointer; font-family: inherit;
  }
  .item-popup .popup-close:hover { background: #333; }
  .item-popup .popup-phase-badge {
    display: inline-block; padding: 3px 10px; border-radius: 4px;
    font-size: 11px; font-weight: 700; color: #fff; letter-spacing: 0.3px;
  }
  .popup-phase-badge.badge-phase1 { background: #ef4444; }
  .popup-phase-badge.badge-phase2 { background: #f59e0b; }
  .popup-phase-badge.badge-ga { background: #6aa100; }

  /* ── FOOTER ── */
  .footer {
    background: #1a1a1a; padding: 10px 28px;
    display: flex; justify-content: space-between; align-items: center;
    font-size: 11px; color: rgba(255,255,255,0.4);
  }
  .footer .live-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: #D2F55E; margin-right: 4px; vertical-align: middle; }
  .footer .offline-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: #ef5350; margin-right: 4px; vertical-align: middle; }

  /* ── METRICS TABLES ── */
  .metrics-section { padding: 40px 28px 48px; background: #f5f5f0; }
  .metrics-section .table-label {
    font-size: 10px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 1.5px; color: #8a8a80; margin-bottom: 8px;
  }
  .metrics-section h2 { font-size: 18px; font-weight: 800; margin-bottom: 6px; color: #1a1a1a; }
  .metrics-section .metrics-intro { font-size: 13px; color: #6b6b60; margin-bottom: 20px; }
  .metrics-table {
    width: 100%; border-collapse: collapse; background: #fff;
    border-radius: 8px; overflow: hidden;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06); margin-bottom: 40px;
  }
  .metrics-table th {
    background: #ededea; font-size: 10px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.5px; color: #6b6b60;
    padding: 12px 10px; text-align: center; border-bottom: 2px solid #d5d5cc;
  }
  .metrics-table th:first-child { text-align: left; padding-left: 16px; }
  .metrics-table td {
    padding: 10px 8px; text-align: center; vertical-align: top;
    border-bottom: 1px solid #eaeae5; font-size: 13px;
  }
  .metrics-table td:first-child { text-align: left; font-weight: 600; padding-left: 16px; font-size: 13px; min-width: 200px; color: #1a1a1a; }
  .metrics-table tr:last-child td { border-bottom: none; }
  .metrics-table tr:hover { background: #fafaf6; }
  .metrics-desc { font-size: 11px; color: #8a8a80; margin-top: 2px; font-weight: 400; }
  .boundary-cell {
    background: #f5f5f0; border-radius: 4px; padding: 8px 12px;
    font-size: 12px; color: #8a8a80; font-style: italic;
  }
  .phase-header { position: relative; }
  .phase-header.p1::after { content: ''; position: absolute; bottom: 0; left: 10%; right: 10%; height: 3px; background: #ef4444; border-radius: 3px 3px 0 0; }
  .phase-header.p1 { color: #991b1b; }
  .phase-header.p2::after { content: ''; position: absolute; bottom: 0; left: 10%; right: 10%; height: 3px; background: #f59e0b; border-radius: 3px 3px 0 0; }
  .phase-header.p2 { color: #92400e; }
  .alert-header { position: relative; }
  .alert-header.caution::after { content: ''; position: absolute; bottom: 0; left: 20%; right: 20%; height: 3px; background: #f59e0b; border-radius: 3px 3px 0 0; }
  .alert-header.revert::after { content: ''; position: absolute; bottom: 0; left: 20%; right: 20%; height: 3px; background: #ef4444; border-radius: 3px 3px 0 0; }
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="topbar-left">
    <span class="topbar-title">IMO 3 - Q2 2026 Roadmap</span>
    <span class="topbar-badge">Q2</span>
    <span class="topbar-update" id="lastUpdate"></span>
  </div>
  <div class="topbar-right">
    <div class="topbar-legend">
    </div>
    <span id="connIndicator" style="font-size:10px;color:rgba(255,255,255,0.35);"></span>
  </div>
</div>

<!-- ITEM POPUP -->
<div class="item-popup-overlay" id="itemPopupOverlay" onclick="closePopup(event)">
  <div class="item-popup" onclick="event.stopPropagation()">
    <div class="popup-title" id="popupTitle"></div>
    <div id="popupBody"></div>
    <button class="popup-close" onclick="closePopup()">Close</button>
  </div>
</div>

<!-- ROADMAP -->
<div class="roadmap-container">
  <div class="roadmap" id="roadmapGrid"></div>
</div>


<!-- FOOTER -->
<div class="footer">
  <span>IMO 3 &middot; Q2 2026</span>
  <span>April &ndash; June &middot; By Country</span>
</div>

<script>
const MONTHS = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
const MONTH_FULL = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const CURRENT_MONTH = new Date().getMonth();
const CURRENT_YEAR = 2026;
const Q2_MONTHS = [3, 4, 5];

const COUNTRY_FLAGS = {
  'UK': '\u{1F1EC}\u{1F1E7}', 'Iceland': '\u{1F1EE}\u{1F1F8}', 'Hungary': '\u{1F1ED}\u{1F1FA}',
  'Czech Republic': '\u{1F1E8}\u{1F1FF}', 'Croatia': '\u{1F1ED}\u{1F1F7}', 'Slovakia': '\u{1F1F8}\u{1F1F0}',
  'Portugal': '\u{1F1F5}\u{1F1F9}', 'Italy': '\u{1F1EE}\u{1F1F9}', 'Spain': '\u{1F1EA}\u{1F1F8}'
};

function generateMonthWeeks(year) {
  const slots = [];
  for (let m = 0; m < 12; m++) {
    const lastDay = new Date(year, m + 1, 0).getDate();
    const ranges = [[1,7],[8,14],[15,21],[22,28]];
    if (lastDay > 28) ranges.push([29, lastDay]);
    ranges.forEach((r, wi) => {
      slots.push({
        idx: slots.length, monthIdx: m, weekInMonth: wi + 1, label: `W${wi + 1}`,
        startDay: new Date(year, m, r[0]), endDay: new Date(year, m, r[1]),
      });
    });
  }
  return slots;
}

const ALL_SLOTS = generateMonthWeeks(CURRENT_YEAR);
const Q2_SLOTS = ALL_SLOTS.filter(s => Q2_MONTHS.includes(s.monthIdx));

function dateToSlotIdx(dateStr) {
  if (!dateStr) return Q2_SLOTS[0] ? Q2_SLOTS[0].idx : 0;
  const d = new Date(dateStr);
  const m = d.getMonth();
  const day = d.getDate();
  const monthSlots = ALL_SLOTS.filter(s => s.monthIdx === m);
  for (let i = monthSlots.length - 1; i >= 0; i--) {
    if (day >= monthSlots[i].startDay.getDate()) return monthSlots[i].idx;
  }
  return monthSlots.length > 0 ? monthSlots[0].idx : 0;
}

const CURRENT_SLOT_IDX = dateToSlotIdx(new Date().toISOString().slice(0, 10));

const FIREBASE_CONFIG = {
  apiKey: "AIzaSyAyEUhJ3wK9iOXcPIXFB7kxPmLIqg-EY4U",
  authDomain: "imo-3-roadmap.firebaseapp.com",
  databaseURL: "https://imo-3-roadmap-default-rtdb.firebaseio.com",
  projectId: "imo-3-roadmap",
  storageBucket: "imo-3-roadmap.firebasestorage.app",
  messagingSenderId: "438198445146",
  appId: "1:438198445146:web:3ee052573ed2f302966463",
  measurementId: "G-8Q8F1PJNDC"
};
const FIREBASE_DB_PATH = 'roadmap_q2_v26';

let data = { swimlanes: [], items: [] };

function escHtml(str) {
  if (!str) return '';
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function formatDateShort(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr);
  return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
}

// ═══════════════════════════════════════════════════
// FIREBASE
// ═══════════════════════════════════════════════════
window.addEventListener('DOMContentLoaded', () => {
  try {
    if (!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
    const db = firebase.database();

    db.ref('.info/connected').on('value', snap => {
      const online = snap.val() === true;
      document.getElementById('connIndicator').innerHTML = online
        ? '<span class="live-dot"></span> Live'
        : '<span class="offline-dot"></span> Connecting...';
    });

    db.ref(FIREBASE_DB_PATH).on('value', snapshot => {
      const val = snapshot.val();
      if (val && val.swimlanes) {
        data.swimlanes = Array.isArray(val.swimlanes) ? val.swimlanes : Object.values(val.swimlanes || {});
        data.items = val.items ? (Array.isArray(val.items) ? val.items : Object.values(val.items)) : [];
        data.items.forEach(it => {
          if (it.neededFor && !Array.isArray(it.neededFor)) it.neededFor = Object.values(it.neededFor);
          if (it.dependentOn && !Array.isArray(it.dependentOn)) it.dependentOn = Object.values(it.dependentOn);
        });
        data.swimlanes.forEach(sl => {
          if (sl.subRows && !Array.isArray(sl.subRows)) sl.subRows = Object.values(sl.subRows);
        });
      }
      if (val && val.lastUpdatedAt) {
        const d = new Date(val.lastUpdatedAt);
        document.getElementById('lastUpdate').textContent = 'Last update: ' +
          d.toLocaleString('en-GB', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' }) +
          (val.lastUpdatedBy ? ' by ' + val.lastUpdatedBy : '');
      }
      render();
    });
  } catch(e) {
    document.getElementById('connIndicator').innerHTML = '<span class="offline-dot"></span> Error';
  }
});

// ═══════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════
function render() {
  const grid = document.getElementById('roadmapGrid');
  if (!grid) return;
  grid.innerHTML = '';
  const visibleSlotIdxs = Q2_SLOTS.map(s => s.idx);
  const colCount = visibleSlotIdxs.length;

  grid.style.gridTemplateColumns = `200px repeat(${colCount}, minmax(140px, 1fr))`;

  // Month headers
  const cornerMonth = document.createElement('div');
  cornerMonth.className = 'month-group-header corner';
  cornerMonth.textContent = '';
  grid.appendChild(cornerMonth);

  let i = 0;
  while (i < visibleSlotIdxs.length) {
    const s = ALL_SLOTS[visibleSlotIdxs[i]];
    const monthIdx = s.monthIdx;
    let span = 0;
    while (i + span < visibleSlotIdxs.length && ALL_SLOTS[visibleSlotIdxs[i + span]].monthIdx === monthIdx) span++;
    const mgh = document.createElement('div');
    mgh.className = 'month-group-header';
    mgh.textContent = MONTHS[monthIdx];
    mgh.style.gridColumn = `span ${span}`;
    grid.appendChild(mgh);
    i += span;
  }

  // Week headers
  const cornerWeek = document.createElement('div');
  cornerWeek.className = 'week-header corner';
  cornerWeek.textContent = '';
  grid.appendChild(cornerWeek);

  let prevMonthIdx = -1;
  visibleSlotIdxs.forEach(sIdx => {
    const s = ALL_SLOTS[sIdx];
    const wh = document.createElement('div');
    let cls = 'week-header';
    if (sIdx === CURRENT_SLOT_IDX) cls += ' current';
    if (s.monthIdx !== prevMonthIdx) cls += ' month-start';
    wh.className = cls;
    wh.textContent = `W${s.weekInMonth}`;
    wh.title = `${s.startDay.toLocaleDateString('en-GB')} – ${s.endDay.toLocaleDateString('en-GB')}`;
    grid.appendChild(wh);
    prevMonthIdx = s.monthIdx;
  });

  // Group items by title+endDate, merging countries
  function mergeItems(rawItems) {
    const groups = {};
    rawItems.forEach(it => {
      const key = (it.title || '') + '||' + (it.endDate || '');
      if (!groups[key]) {
        groups[key] = { ...it, _countries: it.subRow ? [it.subRow] : [] };
      } else {
        if (it.subRow && !groups[key]._countries.includes(it.subRow)) {
          groups[key]._countries.push(it.subRow);
        }
      }
    });
    return Object.values(groups);
  }

  // Render cells for a flat row
  function renderSlotCells(grid, slItems, visibleSlotIdxs, extraCls) {
    let prevMonth = -1;
    visibleSlotIdxs.forEach(sIdx => {
      const s = ALL_SLOTS[sIdx];
      const cell = document.createElement('div');
      let cls = 'swimlane-cell' + (extraCls || '');
      if (sIdx === CURRENT_SLOT_IDX) cls += ' current-week';
      if (s.monthIdx !== prevMonth) cls += ' month-start';
      cell.className = cls;

      const itemsContainer = document.createElement('div');
      itemsContainer.className = 'cell-items';

      const cellItems = slItems.filter(it => dateToSlotIdx(it.endDate) === sIdx);
      const overflowItems = (sIdx === visibleSlotIdxs[0])
        ? slItems.filter(it => dateToSlotIdx(it.endDate) < visibleSlotIdxs[0])
        : [];

      [...cellItems, ...overflowItems].forEach(it => {
        const card = document.createElement('div');
        let cardCls = 'item-card';
        const titleLower = (it.title || '').toLowerCase();
        if (titleLower === 'phase 1') cardCls += ' phase1';
        else if (titleLower === 'phase 2') cardCls += ' phase2';
        else if (titleLower === 'all customers repriced') cardCls += ' phase-ga';
        card.className = cardCls;

        const deliveryDate = formatDateShort(it.endDate);
        const descText = it.description ? escHtml(it.description) : '';
        const countries = (it._countries && it._countries.length > 0) ? it._countries.join(', ') : '';

        card.innerHTML =
          `<div class="item-title">${escHtml(it.title)}</div>` +
          (descText ? `<div class="item-desc">${descText}</div>` : '') +
          `<div class="item-date">${escHtml(deliveryDate)}</div>` +
          (countries ? `<div class="item-countries">${escHtml(countries)}</div>` : '');

        card.addEventListener('click', () => showPopup(it));
        itemsContainer.appendChild(card);
      });

      cell.appendChild(itemsContainer);
      grid.appendChild(cell);
      prevMonth = s.monthIdx;
    });
  }

  // Swimlane rows — all rendered as flat single rows
  const swimlanes = data.swimlanes || [];
  const items = data.items || [];

  swimlanes.forEach((sl, idx) => {
    const label = document.createElement('div');
    label.className = 'swimlane-label';
    label.innerHTML = `<span class="sl-name">${escHtml(sl.name)}</span>` + (sl.id === 's2c' ? '<div style="font-size:11px;color:#78570a;margin-top:6px;line-height:1.4;"><strong>⚠</strong> Items missing because still being scoped: <em>New pricing page in app and portal, new pricing calculator, dynamic pricing, support of contracts for pay-once offers.</em></div>' : '');
    grid.appendChild(label);

    const slItems = items.filter(it => it.swimlaneId === sl.id);
    const merged = mergeItems(slItems);
    renderSlotCells(grid, merged, visibleSlotIdxs, '');
  });
}

// ═══════════════════════════════════════════════════
// ITEM POPUP
// ═══════════════════════════════════════════════════
function showPopup(item) {
  const overlay = document.getElementById('itemPopupOverlay');
  const titleEl = document.getElementById('popupTitle');
  const bodyEl = document.getElementById('popupBody');

  titleEl.textContent = item.title || 'Untitled';

  const titleLower = (item.title || '').toLowerCase();
  let phaseBadge = '';
  if (titleLower === 'phase 1') phaseBadge = '<span class="popup-phase-badge badge-phase1">Phase 1</span>';
  else if (titleLower === 'phase 2') phaseBadge = '<span class="popup-phase-badge badge-phase2">Phase 2</span>';
  else if (titleLower === 'all customers repriced') phaseBadge = '<span class="popup-phase-badge badge-ga">All Customers Repriced</span>';

  const sl = (data.swimlanes || []).find(s => s.id === item.swimlaneId);
  const swimlaneName = sl ? sl.name : '';
  const subRowName = item.subRow || '';

  const startDate = item.startDate ? new Date(item.startDate).toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' }) : '\u2014';
  const endDate = item.endDate ? new Date(item.endDate).toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' }) : '\u2014';

  let html = '';
  if (phaseBadge) html += `<div class="popup-row">${phaseBadge}</div>`;
  html += `<div class="popup-row"><span class="popup-label">Workstream</span><span class="popup-value">${escHtml(swimlaneName)}</span></div>`;
  const countries = (item._countries && item._countries.length > 0) ? item._countries.join(', ') : subRowName;
  if (countries) html += `<div class="popup-row"><span class="popup-label">Country</span><span class="popup-value">${escHtml(countries)}</span></div>`;
  html += `<div class="popup-row"><span class="popup-label">Delivery Date</span><span class="popup-value">${escHtml(endDate)}</span></div>`;
  html += `<div class="popup-row"><span class="popup-label">Start Date</span><span class="popup-value">${escHtml(startDate)}</span></div>`;
  if (item.owner) html += `<div class="popup-row"><span class="popup-label">Owner</span><span class="popup-value">${escHtml(item.owner)}</span></div>`;
  if (item.description) html += `<div class="popup-row"><span class="popup-label">Description</span></div><div class="popup-desc">${escHtml(item.description)}</div>`;
  else html += `<div class="popup-row"><span class="popup-label">Description</span><span class="popup-value" style="color:#8a8a80;font-style:italic;">No description provided</span></div>`;

  bodyEl.innerHTML = html;
  overlay.classList.add('visible');
}

function closePopup(e) {
  if (e && e.target && e.target !== document.getElementById('itemPopupOverlay')) return;
  document.getElementById('itemPopupOverlay').classList.remove('visible');
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closePopup();
});
</script>
</body></html>
